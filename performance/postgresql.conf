# PostgreSQL — оптимизация для SonarQube production
# Урок 13: Масштабирование и производительность

# Память
shared_buffers = 512MB           # 25% RAM
effective_cache_size = 1536MB    # 75% RAM
work_mem = 32MB                  # для сложных запросов
maintenance_work_mem = 128MB

# WAL и checkpoint
checkpoint_completion_target = 0.9
wal_buffers = 16MB
default_statistics_target = 100

# Соединения
max_connections = 50             # SonarQube использует до 40

# Логирование медленных запросов
log_min_duration_statement = 1000  # запросы >1с
log_destination = 'stderr'
