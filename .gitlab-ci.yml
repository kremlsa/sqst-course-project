# GitLab CI/CD — многомодульный анализ SonarQube
# Урок 11: Монорепозитории и многомодульные проекты

image: python:3.11-slim

stages:
  - test
  - dependency-check
  - scan

variables:
  SONAR_PROJECT_KEY: "vulnerable-app"
  SONAR_PROJECT_VERSION: "1.0-lesson11"
  GIT_DEPTH: "0"

test-backend:
  stage: test
  script:
    - pip install flask --quiet
    - echo "Backend tests passed"

test-frontend:
  stage: test
  image: node:18-alpine
  script:
    - echo "Frontend tests passed (placeholder)"

owasp-dependency-check:
  stage: dependency-check
  image: owasp/dependency-check:latest
  script:
    - /usr/share/dependency-check/bin/dependency-check.sh
      --project "vulnerable-app"
      --scan backend/requirements.txt
      --format JSON --out dependency-check-report.json
      --failOnCVSS 7
  artifacts:
    paths:
      - dependency-check-report.json
    when: always

sonar-scan:
  stage: scan
  image: sonarsource/sonar-scanner-cli:latest
  script:
    - sonar-scanner
      -Dsonar.projectKey="${SONAR_PROJECT_KEY}"
      -Dsonar.projectVersion="${SONAR_PROJECT_VERSION}"
      -Dsonar.sources=backend,frontend
      -Dsonar.host.url="${SONAR_HOST_URL}"
      -Dsonar.token="${SONAR_TOKEN}"
  allow_failure: false
