# =============================================================================
# SonarQube — настройки проекта vulnerable-app
# Курс OTUS DevSecOps: SonarQube от А до Я
# =============================================================================
# Документация: https://docs.sonarsource.com/sonarqube/latest/analyzing-source-code/analysis-parameters/

# Уникальный идентификатор проекта в SonarQube
sonar.projectKey=vulnerable-app

# Отображаемое имя проекта
sonar.projectName=Vulnerable App (OTUS Course)

# Версия проекта (будем обновлять по мере развития в уроках)
sonar.projectVersion=1.0-lesson1

# Директория с исходным кодом (относительно корня проекта)
sonar.sources=vulnerable-app

# Исключения из анализа (тесты, конфиги, сгенерированный код)
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/node_modules/**

# Версия Python (Ubuntu 24.04 = Python 3.12)
sonar.python.version=3.12

# URL сервера SonarQube (для локального запуска)
sonar.host.url=http://localhost:9000

# Токен аутентификации — задаётся через переменную среды или CLI
# НИКОГДА не коммитьте токен в репозиторий!
# sonar.token=<задаётся через ENV или параметр -Dsonar.token=...>

# Кодировка исходного кода
sonar.sourceEncoding=UTF-8
