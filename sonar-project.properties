# =============================================================================
# SonarQube — настройки проекта для Урока 5
# Курс OTUS DevSecOps: SonarQube от А до Я
# =============================================================================
# Изменения в Уроке 5:
#   - projectVersion обновлена до 1.0-lesson5
# =============================================================================
# Использование:
#   sonar-scanner -Dsonar.token=<TOKEN>            # через параметр CLI
#   SONAR_TOKEN=<TOKEN> sonar-scanner              # через переменную окружения
#
# Документация по параметрам:
#   https://docs.sonarsource.com/sonarqube/latest/analyzing-source-code/analysis-parameters/
# =============================================================================

# --- Обязательные параметры ------------------------------------------------

# Уникальный идентификатор проекта в SonarQube (не менять после первого анализа!)
sonar.projectKey=vulnerable-app

# Отображаемое название в Web UI
sonar.projectName=Vulnerable App (OTUS Course)

# Версия проекта — появится в истории метрик
sonar.projectVersion=1.0-lesson5

# Директория с исходным кодом (относительно расположения этого файла)
sonar.sources=vulnerable-app

# --- Фильтрация -----------------------------------------------------------

# Исключить из анализа: кеш Python, зависимости, сгенерированный код
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/node_modules/**,.venv/**

# --- Соединение с сервером ------------------------------------------------

# URL SonarQube (для docker compose up — host.docker.internal, иначе localhost)
sonar.host.url=http://localhost:9000

# Токен — НИКОГДА не хранить в файле! Передавать через CLI или ENV:
#   -Dsonar.token=<TOKEN>   или   export SONAR_TOKEN=<TOKEN>
# sonar.token=

# --- Дополнительные настройки (пригодятся в следующих уроках) ------------

# Кодировка исходников
sonar.sourceEncoding=UTF-8

# Покрытие тестами (раскомментировать когда добавим тесты в Уроке 8+)
# sonar.python.coverage.reportPaths=coverage.xml
# sonar.python.xunit.reportPath=test-results.xml

# Отчёт об уязвимостях зависимостей (Урок 9 — OWASP Dependency-Check)
# sonar.dependencyCheck.reportPath=dependency-check-report.xml
# sonar.dependencyCheck.htmlReportPath=dependency-check-report.html
